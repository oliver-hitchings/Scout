name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-audit:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-22.04, macos-15, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node tools/typst-runtime.mjs install
      - run: node tools/typst-runtime.mjs verify --compile
      - run: npm test
      - name: Verify release staging
        run: node tools/build-release.mjs --stage-only
      - name: Audit staged public tree with required private markers
        run: npm run release:audit -- --root dist/release/stage --stage --require-markers
        env:
          SCOUT_RELEASE_MARKERS: ${{ secrets.SCOUT_RELEASE_MARKERS }}

  browser-acceptance:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node tools/typst-runtime.mjs install
      - run: node tools/typst-runtime.mjs verify --compile
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
