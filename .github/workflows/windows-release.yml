name: Cross-platform release candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to package
        required: true
        type: string
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-2022
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci --omit=dev
      - run: npm test
      - run: choco install innosetup --yes --no-progress
      - name: Select and validate version
        id: version
        shell: pwsh
        run: |
          $version = '${{ inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($version)) { $version = '${{ github.ref_name }}'.TrimStart('v') }
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ($version -ne $packageVersion) { throw 'Requested version does not match package version' }
          if ('${{ github.ref_type }}' -eq 'tag' -and '${{ github.ref_name }}' -ne "v$packageVersion") { throw 'Tag does not match package version' }
          "value=$version" | Out-File $env:GITHUB_OUTPUT -Append
      - run: node tools/build-release.mjs --installer --version "${{ steps.version.outputs.value }}"
      - run: npm run release:audit -- --root dist/release/stage --stage --require-markers
        env: { SCOUT_RELEASE_MARKERS: "${{ secrets.SCOUT_RELEASE_MARKERS }}" }
      - name: Smoke install and preserve workspace
        shell: pwsh
        run: |
          $installer = Resolve-Path "installer/output/Scout-${{ steps.version.outputs.value }}-windows-x64.exe"
          $p = Start-Process $installer -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait -PassThru
          if ($p.ExitCode) { throw 'Installer failed' }
          $installed = Join-Path $env:LOCALAPPDATA 'Programs\Scout'; $workspace = Join-Path $env:RUNNER_TEMP 'Scout Workspace'
          & "$installed\runtime\node.exe" "$installed\app\tools\scout.mjs" workspace init --workspace $workspace | Out-Null
          $u = Start-Process "$installed\unins000.exe" -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait -PassThru
          if ($u.ExitCode -or -not (Test-Path "$workspace\workspace.json")) { throw 'Uninstall smoke failed' }
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: installer/output/*.exe

  macos:
    strategy:
      matrix:
        os: [macos-15, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci --omit=dev
      - run: npm test
      - run: node tools/build-platform.mjs mac
      - run: npm run release:audit -- --root "dist/release/macos-$(node -p process.arch)" --stage --require-markers
        env: { SCOUT_RELEASE_MARKERS: "${{ secrets.SCOUT_RELEASE_MARKERS }}" }
      - name: Mount and initialise workspace
        run: |
          dmg=$(find installer/output -name '*.dmg' -print -quit)
          mount=$(mktemp -d); hdiutil attach "$dmg" -mountpoint "$mount" -nobrowse
          workspace=$(mktemp -d)/Scout; "$mount/Scout.app/Contents/Resources/runtime/node" "$mount/Scout.app/Contents/Resources/app/tools/scout.mjs" workspace init --workspace "$workspace"
          test -f "$workspace/workspace.json"; hdiutil detach "$mount"; test -f "$workspace/workspace.json"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.os }}
          path: installer/output/*.dmg

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci --omit=dev
      - run: npm test
      - run: node tools/build-platform.mjs linux
      - run: npm run release:audit -- --root dist/release/linux-x64 --stage --require-markers
        env: { SCOUT_RELEASE_MARKERS: "${{ secrets.SCOUT_RELEASE_MARKERS }}" }
      - name: Install, initialise and uninstall DEB
        run: |
          sudo apt-get install -y ./installer/output/*.deb
          workspace=$(mktemp -d)/Scout; /opt/scout/runtime/node /opt/scout/app/tools/scout.mjs workspace init --workspace "$workspace"
          sudo apt-get remove -y scout; test -f "$workspace/workspace.json"
          tar -tzf installer/output/*.tar.gz | grep -q scout-dashboard
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            installer/output/*.deb
            installer/output/*.tar.gz

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos, linux]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: release-assets, merge-multiple: true }
      - name: Create combined checksums
        run: cd release-assets && sha256sum Scout-* > checksums.txt
      - name: Publish prerelease
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          version=${GITHUB_REF_NAME#v}
          gh release create "$GITHUB_REF_NAME" release-assets/* --title "Scout $version" --notes-file "docs/releases/$version.md" --prerelease --verify-tag
