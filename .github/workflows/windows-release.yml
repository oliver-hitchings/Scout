name: Cross-platform release candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to package
        required: true
        type: string
      deploy_vps:
        description: Deploy this release-candidate branch to the private Beta VPS without publishing
        required: false
        default: false
        type: boolean
      test_rollback:
        description: Intentionally fail after restart so the rehearsal must restore the previous commit
        required: false
        default: false
        type: boolean
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-2022
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci --omit=dev
      - run: npm test
      - run: choco install innosetup --yes --no-progress
      - name: Select and validate version
        id: version
        shell: pwsh
        run: |
          $version = '${{ inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($version)) { $version = '${{ github.ref_name }}'.TrimStart('v') }
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ($version -ne $packageVersion) { throw 'Requested version does not match package version' }
          if ('${{ github.ref_type }}' -eq 'tag' -and '${{ github.ref_name }}' -ne "v$packageVersion") { throw 'Tag does not match package version' }
          "value=$version" | Out-File $env:GITHUB_OUTPUT -Append
      - run: node tools/build-release.mjs --installer --version "${{ steps.version.outputs.value }}"
      - run: npm run release:audit -- --root dist/release/stage --stage --require-markers
        env: { SCOUT_RELEASE_MARKERS: "${{ secrets.SCOUT_RELEASE_MARKERS }}" }
      - name: Smoke install and preserve workspace
        shell: pwsh
        run: |
          $installer = Resolve-Path "installer/output/Scout-${{ steps.version.outputs.value }}-windows-x64.exe"
          $p = Start-Process $installer -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait -PassThru
          if ($p.ExitCode) { throw 'Installer failed' }
          $installed = Join-Path $env:LOCALAPPDATA 'Programs\Scout'; $workspace = Join-Path $env:RUNNER_TEMP 'Scout Workspace'
          & "$installed\runtime\ScoutRuntime.exe" "$installed\app\tools\scout.mjs" workspace init --workspace $workspace | Out-Null
          if (-not (Test-Path "$installed\Scout.exe")) { throw 'Scout host missing' }
          $u = Start-Process "$installed\unins000.exe" -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait -PassThru
          if ($u.ExitCode -or -not (Test-Path "$workspace\workspace.json")) { throw 'Uninstall smoke failed' }
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: installer/output/*.exe

  macos:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci --omit=dev
      - run: npm test
      - run: node tools/build-platform.mjs mac
      - run: npm run release:audit -- --root "dist/release/macos-$(node -p process.arch)" --stage --require-markers
        env: { SCOUT_RELEASE_MARKERS: "${{ secrets.SCOUT_RELEASE_MARKERS }}" }
      - name: Mount and initialise workspace
        run: |
          set -euxo pipefail
          dmg=$(find installer/output -name '*.dmg' -print -quit)
          mount=$(mktemp -d)
          hdiutil attach "$dmg" -mountpoint "$mount" -nobrowse
          runtime="$mount/Scout.app/Contents/Resources/runtime/node"
          cli="$mount/Scout.app/Contents/Resources/app/tools/scout.mjs"
          workspace=$(mktemp -d)/Scout
          find "$mount/Scout.app/Contents/Resources" -maxdepth 3 -print
          test -x "$runtime"
          test -f "$cli"
          file "$runtime"
          "$runtime" --version
          "$runtime" "$cli" workspace init --workspace "$workspace"
          test -f "$workspace/workspace.json"
          hdiutil detach "$mount"
          test -f "$workspace/workspace.json"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.os }}
          path: installer/output/*.dmg

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci --omit=dev
      - run: npm test
      - run: node tools/build-platform.mjs linux
      - run: npm run release:audit -- --root dist/release/linux-x64 --stage --require-markers
        env: { SCOUT_RELEASE_MARKERS: "${{ secrets.SCOUT_RELEASE_MARKERS }}" }
      - name: Install, initialise and uninstall DEB
        run: |
          sudo apt-get install -y ./installer/output/*.deb
          workspace=$(mktemp -d)/Scout; /opt/scout/runtime/node /opt/scout/app/tools/scout.mjs workspace init --workspace "$workspace"
          sudo apt-get remove -y scout; test -f "$workspace/workspace.json"
          tar -tzf installer/output/*.tar.gz | grep -q scout-dashboard
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            installer/output/*.deb
            installer/output/*.tar.gz

  deploy-vps:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.deploy_vps)
    needs: [windows, macos, linux]
    runs-on: ubuntu-22.04
    environment: beta-vps
    concurrency:
      group: scout-beta-vps
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Join the private deployment tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:scout-deploy
          ping: ${{ secrets.SCOUT_VPS_HOST }}
      - name: Configure pinned SSH credentials
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SCOUT_VPS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SCOUT_VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
      - name: Deploy the exact release tag and verify local health
        shell: bash
        env:
          VPS_HOST: ${{ secrets.SCOUT_VPS_HOST }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          mode=release
          force_failure=false
          if [[ "$GITHUB_EVENT_NAME" == workflow_dispatch ]]; then
            mode=rehearsal
            [[ "$GITHUB_REF" == refs/heads/agent/beta11-release-candidate ]]
            force_failure='${{ inputs.test_rollback }}'
          fi
          release_commit=$(git rev-parse HEAD)
          version='${{ needs.windows.outputs.version }}'
          printf -v remote_command 'bash -s -- %q %q %q %q %q' "$mode" "$GITHUB_REF" "$release_commit" "$version" "$force_failure"
          ssh -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 \
            ubuntu@"$VPS_HOST" "$remote_command" < tools/deploy-vps.sh
      - name: Confirm a tagged Tailscale runner cannot open Scout
        shell: bash
        env:
          VPS_HOST: ${{ secrets.SCOUT_VPS_HOST }}
        run: |
          set -euo pipefail
          status=$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "https://$VPS_HOST/api/app-info")
          if [[ "$status" != 403 ]]; then
            printf 'A tagged Tailscale runner must receive HTTP 403, got %s.\n' "$status" >&2
            exit 1
          fi

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos, linux, deploy-vps]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: release-assets, merge-multiple: true }
      - name: Create combined checksums
        run: cd release-assets && sha256sum Scout-* > checksums.txt
      - name: Publish prerelease
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          version=${GITHUB_REF_NAME#v}
          gh release create "$GITHUB_REF_NAME" release-assets/* --title "Scout $version" --notes-file "docs/releases/$version.md" --prerelease --verify-tag
