<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scout</title>
  <link rel="icon" href="/assets/scout-icon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/assets/scout-icon.png">
  <link rel="apple-touch-icon" href="/assets/scout-icon.png">
  <style>
    :root {
      --scout-fallback: none;
      color-scheme: light dark;
      /* Stitch "Scout Career Tracker" tokens — light mode */
      --surface: #f8f9ff;
      --surface-container-lowest: #ffffff;
      --surface-container-low: #eff4ff;
      --surface-container: #e5eeff;
      --surface-container-high: #dce9ff;
      --on-surface: #0b1c30;
      --on-surface-variant: #464555;
      --outline: #777587;
      --outline-variant: #c7c4d8;
      --primary: #3525cd;
      --primary-container: #4f46e5;
      --on-primary: #ffffff;
      --on-primary-container: #dad7ff;
      --primary-fixed: #e2dfff;
      --secondary: #006c49;
      --secondary-container: #6cf8bb;
      --tertiary: #885500;
      --tertiary-fixed: #ffddb8;
      --error: #ba1a1a;
      --error-container: #ffdad6;

      /* semantic aliases used throughout this file */
      --bg: var(--surface);
      --fg: var(--on-surface);
      --muted: var(--on-surface-variant);
      --line: var(--outline-variant);
      --panel: var(--surface-container-low);
      --panel-2: var(--surface-container);
      --card-bg: var(--surface-container-lowest);
      --accent: var(--primary);
      --good: var(--secondary);
      --good-bg: var(--secondary-container);
      --warn: var(--tertiary);
      --warn-bg: var(--tertiary-fixed);
      --danger: var(--error);
      --shadow: 0 1px 2px rgba(11, 28, 48, 0.06), 0 1px 1px rgba(11, 28, 48, 0.04);
      --shadow-hover: 0 2px 8px rgba(11, 28, 48, 0.1);

      --radius-card: 12px;
      --radius-control: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface: #0f172a;
        --surface-container-lowest: #16213a;
        --surface-container-low: #1a2438;
        --surface-container: #1e293b;
        --surface-container-high: #263349;
        --on-surface: #e2e8f0;
        --on-surface-variant: #a3adc2;
        --outline: #64748b;
        --outline-variant: #334155;
        --primary: #818cf8;
        --primary-container: #3730a3;
        --on-primary: #101227;
        --on-primary-container: #e0e2ff;
        --primary-fixed: #2a2560;
        --secondary: #4edea3;
        --secondary-container: #0f3d2e;
        --tertiary: #ffb95f;
        --tertiary-fixed: #4a3110;
        --error: #ffb4ab;
        --error-container: #5c1a16;

        --bg: var(--surface);
        --fg: var(--on-surface);
        --muted: var(--on-surface-variant);
        --line: var(--outline-variant);
        --panel: var(--surface-container-low);
        --panel-2: var(--surface-container);
        --card-bg: var(--surface-container-lowest);
        --accent: var(--primary);
        --good: var(--secondary);
        --good-bg: var(--secondary-container);
        --warn: var(--tertiary);
        --warn-bg: var(--tertiary-fixed);
        --danger: var(--error);
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 1px rgba(0, 0, 0, 0.2);
        --shadow-hover: 0 2px 8px rgba(0, 0, 0, 0.4);
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Geist", "Geist Sans", Inter, system-ui, sans-serif;
      font-size: 14px;
      line-height: 20px;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); }

    /* Header / nav */
    header {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 24px;
      height: 56px;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--card-bg);
      box-shadow: var(--shadow);
    }
    header b {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.01em;
    }
    nav { display: flex; gap: 4px; align-items: center; height: 100%; }
    nav button {
      background: none;
      border: none;
      color: var(--muted);
      font: inherit;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 10px;
      height: 100%;
      border-bottom: 2px solid transparent;
      transition: color .15s ease, border-color .15s ease;
    }
    nav button:hover { color: var(--fg); }
    nav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
    #scan-status {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    main { padding: 24px; max-width: 1100px; margin: 0 auto; }

    section + section { margin-top: 24px; }

    .label {
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 24px 0 8px;
    }
    .label:first-child { margin-top: 0; }

    /* Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      padding: 16px;
      margin: 8px 0;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-hover);
    }
    .card.action {
      border-color: color-mix(in srgb, var(--good) 45%, var(--line));
      border-left: 3px solid var(--good);
      background: color-mix(in srgb, var(--good) 6%, var(--card-bg));
    }
    .card.flag {
      border-left: 3px solid var(--warn);
      padding-left: 13px;
    }
    .card .top { display: flex; gap: 10px; align-items: baseline; }
    .card .top b { font-size: 16px; font-weight: 500; }
    .card .score {
      font-size: 13px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      border: 1px solid var(--line);
    }
    .card .score.fit-strong { background: var(--good-bg); color: var(--good); border-color: transparent; }
    .card .score.fit-medium { background: var(--warn-bg); color: var(--warn); border-color: transparent; }
    .card .score.fit-weak { background: var(--panel-2); color: var(--muted); border-color: var(--line); }
    .card .meta { color: var(--muted); font-size: 12px; letter-spacing: 0.02em; margin-top: 4px; }

    .chip {
      margin-left: auto;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 10px;
      color: var(--muted);
    }

    .chip-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip-list .chip { margin-left: 0; }

    .detail {
      margin-top: 12px;
      border-top: 1px dashed var(--line);
      padding-top: 12px;
      display: none;
    }
    .card.open .detail { display: block; }
    .detail .label { margin-top: 16px; }
    .detail .label:first-child { margin-top: 0; }

    /* Score breakdown bars: app.js emits <div class="meta">label <span style="width:Npx"></span> value</div> */
    .detail .meta span {
      display: inline-block;
      height: 6px;
      border-radius: 3px;
      vertical-align: middle;
      background: var(--accent);
      margin: 0 6px;
    }

    /* Source button + in-card source panel */
    .source-btn {
      display: block;
      margin-top: 10px;
      padding: 10px 14px;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.02em;
      border: 1px solid var(--accent);
      border-radius: var(--radius-control);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      text-decoration: none;
      transition: background .15s ease;
    }
    .source-btn:hover { background: color-mix(in srgb, var(--accent) 16%, transparent); }
    .source-panel .meta a { margin-right: 6px; }
    .source-body { margin-top: 8px; }
    .source-text {
      max-height: 340px;
      overflow-y: auto;
      white-space: pre-wrap;
      margin-top: 8px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-control);
      background: var(--panel);
      font-size: 12px;
      line-height: 1.5;
    }

    /* Table (All tab) */
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); }
    th {
      color: var(--muted);
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
    }
    tbody tr { transition: background .1s ease; }
    tbody tr:hover { background: var(--panel); }

    input, textarea, select, button.act { font: inherit; color: var(--fg); }
    input, textarea, select {
      border: 1px solid var(--line);
      border-radius: var(--radius-control);
      background: var(--card-bg);
      padding: 6px 10px;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 30%, transparent);
    }

    .controls { display: flex; gap: 8px; margin-bottom: 8px; }
    .controls input { flex: 1; padding: 6px 10px; background: var(--panel); }

    .act {
      padding: 5px 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--fg);
      border-radius: var(--radius-control);
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease;
    }
    button.act:hover { background: var(--surface-container-high); border-color: var(--outline); }
    .act.bridge {
      border-style: dashed;
      border-color: var(--accent);
      color: var(--accent);
      background: transparent;
    }
    button.act.bridge:hover { background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .act.active { background: var(--primary-fixed); color: var(--accent); border-color: var(--accent); font-weight: 700; }

    /* Reports */
    .report-body {
      white-space: pre-wrap;
      font: 13px/1.6 ui-monospace, monospace;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 16px;
      border-radius: var(--radius-card);
    }
    .report-list { display: flex; gap: 24px; align-items: flex-start; }
    .report-list .dates {
      flex: 0 0 220px;
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      padding: 8px;
    }
    .report-list .dates button {
      display: block;
      width: 100%;
      text-align: left;
      margin: 2px 0;
      padding: 8px 10px;
      border-radius: var(--radius-control);
      border: 1px solid transparent;
      background: transparent;
      color: var(--fg);
      cursor: pointer;
    }
    .report-list .dates button:hover { background: var(--panel); }
    .report-list .dates button.active {
      background: var(--primary-fixed);
      color: var(--accent);
      font-weight: 700;
    }
    .report-list .report-body { flex: 1; min-width: 0; }

    /* Metrics / stat tiles */
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin: 8px 0 20px; }
    .metric {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      padding: 12px 16px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.02em;
    }
    .metric b { display: block; font-size: 24px; font-weight: 700; letter-spacing: -0.01em; color: var(--fg); }

    .split { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; align-items: start; }
    .stage-list { margin: 4px 0 8px; padding-left: 18px; color: var(--muted); font-size: 12px; }

    /* CV workspace */
    .cv-layout {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .cv-sidebar .act { display: block; width: 100%; margin: 4px 0; text-align: left; }
    .cv-editor-panel { min-width: 0; }
    .cv-source {
      width: 100%;
      min-height: 380px;
      font: 12px/1.5 ui-monospace, monospace;
      background: var(--panel);
      color: var(--fg);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      resize: vertical;
    }
    .cv-chat-request { margin-top: 18px; padding: 14px; border: 1px solid var(--line); border-radius: var(--radius-card); background: var(--panel); }
    .cv-chat-request .meta { line-height: 1.45; margin-bottom: 10px; }
    .cv-chat-request-row { display: flex; gap: 8px; align-items: stretch; }
    .cv-chat-request-row input { flex: 1; min-width: 0; padding: 8px 10px; }
    .cv-preview-panel { grid-column: 1 / -1; min-width: 0; }
    .cv-preview-toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 8px 0; }
    .cv-preview-toolbar > :first-child { margin-right: auto !important; }
    .cv-preview-toolbar label { display: flex; align-items: center; gap: 6px; }
    #cv-preview-shell { min-height: 680px; height: 78vh; padding: 10px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-card); }
    #cv-preview { width: 100%; height: 100%; }
    .cv-preview-frame { display: block; width: 100%; height: 100%; border: 0; border-radius: 6px; background: #fff; }
    .cv-preview-status, .cv-preview-error { padding: 24px; color: var(--muted); white-space: pre-wrap; }
    .cv-preview-error { color: #d33; }
    #cv-preview-shell:fullscreen { width: 100vw; height: 100vh; padding: 12px; border: 0; border-radius: 0; background: var(--surface); }
    @media (max-width: 850px) {
      .cv-layout { grid-template-columns: 1fr; }
      .cv-preview-panel { grid-column: 1; }
      .cv-chat-request-row { flex-direction: column; }
      #cv-preview-shell { min-height: 540px; height: 72vh; }
    }

    /* Filter bar */
    .filterbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      padding: 12px;
      margin-bottom: 16px;
    }
    .filterbar label { color: var(--muted); font-size: 12px; display: flex; gap: 6px; align-items: center; }
    .filterbar input[type="number"] {
      width: 74px;
      padding: 5px 8px;
      background: var(--card-bg);
      border-radius: 999px;
    }
    .filterbar input[type="text"] {
      border-radius: 999px;
    }

    /* First-run setup */
    .setup-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 24px;
      background: color-mix(in srgb, var(--surface) 78%, transparent);
      backdrop-filter: blur(8px);
    }
    .setup-overlay.hidden { display: none; }
    .setup-dialog {
      width: min(820px, 100%);
      max-height: calc(100vh - 48px);
      max-height: calc(100dvh - 48px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card-bg);
      box-shadow: 0 18px 60px rgba(11, 28, 48, .24);
    }
    .setup-head { padding: 22px 24px 16px; border-bottom: 1px solid var(--line); }
    .setup-head h1 { margin: 0 0 4px; font-size: 24px; line-height: 32px; }
    .setup-progress { display: flex; gap: 6px; margin-top: 16px; }
    .setup-progress span { height: 4px; flex: 1; border-radius: 99px; background: var(--panel-2); }
    .setup-progress span.done { background: var(--accent); }
    .setup-body { padding: 24px; }
    .setup-body h2 { margin: 0 0 8px; font-size: 20px; }
    .setup-body h3 { margin: 20px 0 8px; font-size: 14px; }
    .setup-body p { color: var(--muted); }
    .setup-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .setup-field { display: grid; gap: 5px; color: var(--muted); font-size: 12px; }
    .setup-field.wide { grid-column: 1 / -1; }
    .setup-field input, .setup-field select, .setup-field textarea { width: 100%; padding: 9px 10px; }
    .setup-field textarea { min-height: 76px; resize: vertical; }
    .setup-callout {
      padding: 14px;
      border-radius: var(--radius-card);
      background: var(--panel);
      border: 1px solid var(--line);
    }
    .setup-callout strong { display: block; margin-bottom: 4px; }
    .setup-callout p { margin: 4px 0; }
    .setup-provider-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin: 16px 0; }
    .setup-provider { display: block; padding: 14px; border: 1px solid var(--line); border-radius: var(--radius-card); }
    .setup-provider.available { border-color: color-mix(in srgb, var(--good) 45%, var(--line)); }
    .setup-provider input { margin-right: 6px; }
    .setup-provider .meta { display: block; margin-top: 5px; color: var(--muted); font-size: 12px; }
    .setup-actions { display: flex; align-items: center; gap: 8px; padding: 16px 24px 22px; border-top: 1px solid var(--line); }
    .setup-actions .primary { margin-left: auto; color: var(--on-primary); background: var(--primary); border-color: var(--primary); }
    .setup-actions .danger-link { border: 0; background: none; color: var(--muted); text-decoration: underline; cursor: pointer; }
    .setup-status { min-height: 20px; color: var(--muted); font-size: 12px; }
    .setup-status.error { color: var(--danger); }
    .setup-status.good { color: var(--good); }
    .setup-preview, .setup-prompt {
      width: 100%;
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-control);
      background: var(--panel);
      color: var(--fg);
      font: 12px/1.5 ui-monospace, monospace;
    }
    .setup-prompt { min-height: 170px; resize: vertical; }
    .setup-conversation { display:grid; grid-template-columns:220px minmax(0,1fr); gap:20px; align-items:start; }
    .setup-scout { width:220px; display:grid; place-items:center; padding-top:12px; }
    .setup-scout img { width:210px; height:210px; object-fit:contain; }
    .setup-scout-frame { display:block; width:210px; height:210px; background-image:url('/assets/scout-idle.png'),var(--scout-fallback); background-size:400% 400%,contain; background-position:0 0,center; background-repeat:no-repeat; }
    .setup-scout-welcome { animation:setup-scout-wave 2s step-end 1; }
    @keyframes setup-scout-wave { 0%{background-position:0 0} 35%{background-position:100% 33.333%} 60%{background-position:33.333% 66.667%} 100%{background-position:0 0} }
    @media (max-width: 650px) {
      .setup-overlay { padding: 0; }
      .setup-dialog { max-height: 100vh; max-height: 100dvh; min-height: 100vh; min-height: 100dvh; border-radius: 0; }
      .setup-grid, .setup-provider-list { grid-template-columns: 1fr; }
      .setup-conversation { grid-template-columns:1fr; justify-items:center; }
      .setup-scout { width:140px; padding-top:0; }
      .setup-scout img { width:132px; height:132px; }
      .setup-scout-frame { width:132px; height:132px; }
      .setup-conversation .scout-bubble { justify-self:stretch; }
      .setup-conversation .scout-bubble.tail-left::after { left:50%; top:-8px; margin-left:-7px; border:0; border-left:1px solid var(--line); border-top:1px solid var(--line); }
    }

    .hidden { display: none; }

    /* Chat drawer */
    .chat-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(480px, 100vw);
      height: 100vh;
      height: 100dvh;
      background: var(--card-bg);
      border-left: 1px solid var(--line);
      box-shadow: var(--shadow-hover);
      display: flex;
      flex-direction: column;
      /* Setup opens this drawer as its AI hand-off. Keep it above the modal's
         full-screen backdrop so the engine picker and composer stay clickable. */
      z-index: 120;
    }
    .chat-drawer.hidden { display: none; }
    .chat-head {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
      border-bottom: 1px solid var(--line);
    }
    .chat-head b { font-size: 14px; }
    .chat-head .meta { font-size: 11px; }
    .chat-body { flex: 1; min-height: 0; overflow-y: auto; padding: 12px 16px; }
    .chat-msg {
      margin: 8px 0;
      padding: 8px 12px;
      border-radius: var(--radius-card);
      max-width: 85%;
      white-space: pre-wrap;
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .chat-msg.user { margin-left: auto; background: var(--primary-fixed); }
    .chat-msg.assistant { background: var(--panel); border: 1px solid var(--line); }
    .chat-msg.system {
      margin: 8px auto;
      max-width: 100%;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      background: transparent;
      padding: 0;
    }
    .chat-msg.tool { color: var(--muted); font-size: 11px; background: transparent; padding: 0 12px; margin: 2px 0; }
    .chat-picker { text-align: center; padding: 40px 0; }
    .chat-picker .act { margin: 0 6px; }
    .chat-foot {
      display: flex;
      gap: 8px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
    }
    .chat-foot textarea { flex: 1; min-height: 60px; resize: vertical; font-size: 13px; }
    .scout-character { display:inline-block; flex:0 0 auto; width:96px; height:96px; overflow:hidden; }
    .scout-bubble { position:relative; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:14px 18px; box-shadow:0 10px 30px rgba(0,0,0,.12); }
    .scout-bubble::after { content:''; position:absolute; width:14px; height:14px; background:var(--panel); transform:rotate(45deg); }
    .scout-bubble.tail-left::after { left:-8px; top:38px; border-left:1px solid var(--line); border-bottom:1px solid var(--line); }
    .scout-bubble.tail-right::after { right:-8px; bottom:34px; border-right:1px solid var(--line); border-top:1px solid var(--line); }
    .scout-sprite { display:block; width:100%; height:100%; background-image:var(--scout-src),var(--scout-fallback); background-repeat:no-repeat; background-size:calc(var(--scout-columns) * 100%) calc(var(--scout-rows) * 100%),contain; background-position:0 0,center; animation:scout-frames var(--scout-duration) step-end var(--scout-iterations); }
    .scout-sprite.reduced-motion { animation:none; background-position:var(--scout-still-x) var(--scout-still-y), center; }
    .scout-offscreen .scout-sprite, .scout-page-hidden .scout-sprite { animation-play-state:paused; }
    @keyframes scout-frames {
      0% { background-position:0 0,center; } 6.25% { background-position:33.333% 0,center; }
      12.5% { background-position:66.667% 0,center; } 18.75% { background-position:100% 0,center; }
      25% { background-position:0 33.333%,center; } 31.25% { background-position:33.333% 33.333%,center; }
      37.5% { background-position:66.667% 33.333%,center; } 43.75% { background-position:100% 33.333%,center; }
      50% { background-position:0 66.667%,center; } 56.25% { background-position:33.333% 66.667%,center; }
      62.5% { background-position:66.667% 66.667%,center; } 68.75% { background-position:100% 66.667%,center; }
      75% { background-position:0 100%,center; } 81.25% { background-position:33.333% 100%,center; }
      87.5% { background-position:66.667% 100%,center; } 93.75%,100% { background-position:100% 100%,center; }
    }
    .chat-companion { display:flex; gap:12px; align-items:center; padding:10px 16px 4px; color:var(--muted); font-size:12px; }
    .chat-companion .scout-character { width:112px; height:112px; }
    .chat-companion .scout-bubble { padding:10px 14px; max-width:360px; }
    .chat-companion .scout-bubble.tail-left::after { top:50%; margin-top:-7px; }
    .chat-row { display:flex; align-items:flex-end; gap:6px; margin:8px 0; }
    .chat-row.user { justify-content:flex-end; }
    .chat-row .chat-msg { margin:0; }
    .scout-chat-avatar { width:44px; height:44px; }
    .scout-arrival { position:fixed; right:10px; bottom:0; z-index:35; display:flex; align-items:flex-end; max-width:min(480px,calc(100vw - 20px)); animation:scout-arrive .35s ease-out; }
    .scout-arrival.hidden { display:none; }
    .scout-arrival-character { width:170px; height:170px; }
    .scout-arrival-copy { display:grid; gap:7px; margin-bottom:72px; }
    .scout-arrival-copy span { color:var(--muted); font-size:12px; }
    .scout-arrival-copy button { margin-right:7px; }
    .source-health { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .source-healthy { border-color:var(--good); color:var(--good); }
    .source-degraded { border-color:var(--warn); color:var(--warn); }
    .source-unavailable { border-color:var(--danger); color:var(--danger); }
    @keyframes scout-arrive { from { opacity:0; transform:translateX(30px); } }
    @media (prefers-reduced-motion:reduce) { .scout-sprite { animation:none; background-position:var(--scout-still-x) var(--scout-still-y), center; } .scout-arrival { animation:none; } }
    @media (max-width:620px) { .scout-arrival { right:6px; } .scout-arrival-character { width:120px; height:120px; } .scout-arrival-copy { margin-bottom:48px; } }
    @media (max-width:700px) {
      body { overflow-x:hidden; }
      header { height:auto; min-height:56px; padding:8px 12px 0; gap:8px 12px; flex-wrap:wrap; }
      header b { align-self:center; }
      nav { order:3; width:calc(100% + 24px); height:46px; margin:0 -12px; padding:0 8px; overflow-x:auto; overscroll-behavior-x:contain; scrollbar-width:thin; }
      nav button { flex:0 0 auto; min-height:44px; padding:4px 12px; }
      #scan-status { margin-left:auto; max-width:65%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      main { padding:12px; }
      .card { padding:13px; }
      .card .top { align-items:center; flex-wrap:wrap; }
      .card .top b { flex:1 1 210px; overflow-wrap:anywhere; }
      .filterbar { align-items:stretch; }
      .filterbar label { min-height:44px; }
      .filterbar select, .filterbar input { min-height:40px; max-width:100%; }
      .metrics { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .setup-head { padding:16px; }
      .setup-body { padding:16px; }
      .setup-actions { position:sticky; bottom:0; z-index:2; padding:12px 16px calc(12px + env(safe-area-inset-bottom)); background:var(--card-bg); flex-wrap:wrap; }
      .setup-actions button { min-height:44px; }
      .chat-drawer { width:100vw; border-left:0; }
      .chat-head button, .chat-foot button { min-width:44px; min-height:44px; }
      .chat-body { padding:10px 12px; }
      .chat-foot { padding-left:12px; padding-right:12px; }
      .chat-companion { align-items:flex-end; padding:8px 12px 2px; }
      .chat-companion .scout-character { width:82px; height:82px; }
      .chat-companion .scout-bubble { max-width:calc(100vw - 118px); }
      .scout-arrival { right:4px; max-width:calc(100vw - 8px); }
      .scout-arrival-character { width:104px; height:104px; }
      .scout-arrival-copy { min-width:0; margin-bottom:46px; }
      .scout-arrival-copy .scout-bubble { padding:10px 12px; }
      .scout-arrival-copy button { min-height:44px; margin-top:2px; }
    }
    @media (max-width:380px) {
      #scan-status { display:none; }
      .setup-scout, .setup-scout-frame { width:112px; height:112px; }
      .chat-companion .scout-character { width:68px; height:68px; }
      .chat-companion .scout-bubble { max-width:calc(100vw - 100px); }
      .scout-arrival-character { width:88px; height:88px; }
    }
  </style>

  <header>

      <button data-tab="pipeline">Pipeline</button>
      <button data-tab="all">All</button>
